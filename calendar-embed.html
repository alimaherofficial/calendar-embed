<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Today — Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#edddd6;
    --cream-dim:#bdb3a8;
    --muted:#8a857a;
    --hair:rgba(237,221,214,.10);
    --hair-strong:rgba(237,221,214,.22);
    --volt:#d4ff00;
    --rose:#c39595;
    --ink:#16140f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:transparent}
  body{
    color:var(--cream);
    font-family:'Fraunces',serif;
    -webkit-font-smoothing:antialiased;
    display:flex;align-items:center;justify-content:center;
    padding:14px;overflow:hidden;
  }
  .mono{font-family:'JetBrains Mono',monospace;letter-spacing:.14em;text-transform:uppercase;font-feature-settings:"tnum" 1}

  /* the card creates its own depth: layered radial glow + dot grid + offset shadow */
  .card{
    width:100%;height:100%;max-width:760px;max-height:460px;
    position:relative;
    display:grid;grid-template-columns:260px 1fr;gap:0;
    background:
      radial-gradient(120% 80% at 0% 0%, rgba(195,149,149,.18), transparent 55%),
      radial-gradient(110% 90% at 100% 100%, rgba(212,255,0,.06), transparent 55%),
      linear-gradient(180deg, rgba(31,28,22,.92), rgba(20,18,14,.94));
    border:1px solid var(--hair-strong);
    box-shadow:
      10px 10px 0 rgba(195,149,149,.25),
      0 30px 80px rgba(0,0,0,.45),
      inset 0 1px 0 rgba(237,221,214,.06);
    backdrop-filter: blur(14px) saturate(120%);
    -webkit-backdrop-filter: blur(14px) saturate(120%);
    overflow:hidden;
  }
  .card:before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:radial-gradient(rgba(237,221,214,.05) 1px,transparent 1px);
    background-size:18px 18px;
    mix-blend-mode:overlay;opacity:.6;
  }
  .card:after{
    content:"";position:absolute;left:0;top:0;height:100%;width:3px;background:var(--volt);box-shadow:0 0 24px rgba(212,255,0,.5);
  }

  /* ---------- LEFT: today panel ---------- */
  .left{
    padding:22px 22px 18px;
    display:flex;flex-direction:column;gap:14px;
    border-right:1px solid var(--hair);
    position:relative;z-index:1;
  }
  .head{display:flex;justify-content:space-between;align-items:baseline}
  .head .month{font-weight:300;font-style:italic;font-size:22px;letter-spacing:-.01em;line-height:1}
  .head .month b{font-style:normal;font-weight:400}
  .head .year{font-size:9px;color:var(--volt)}

  .big{
    margin-top:4px;
    font-weight:300;font-size:120px;line-height:.82;letter-spacing:-.05em;
    color:var(--cream);font-feature-settings:"tnum" 1;
    text-shadow:0 6px 30px rgba(0,0,0,.4);
  }
  .day{font-style:italic;font-weight:300;font-size:24px;color:var(--rose);line-height:1;margin-top:2px}
  .iso{font-size:10px;color:var(--muted);margin-top:6px}

  .clock{
    margin-top:auto;
    display:flex;justify-content:space-between;align-items:center;
    border-top:1px solid var(--hair);padding-top:12px;
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cream-dim);letter-spacing:.08em;
  }
  .clock b{color:var(--volt);font-weight:500}
  .pulse{display:inline-block;width:6px;height:6px;background:var(--volt);margin-right:6px;vertical-align:middle;box-shadow:0 0 8px var(--volt);animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* ---------- RIGHT: month grid ---------- */
  .right{
    padding:20px 22px 18px;
    display:flex;flex-direction:column;gap:8px;
    position:relative;z-index:1;min-width:0;
  }
  .nav{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--hair);padding-bottom:10px}
  .nav .label{font-size:10px;color:var(--muted)}
  .nav .week{font-size:10px;color:var(--rose)}

  .dow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;font-size:9px;color:var(--muted);text-align:center;padding:2px 0}
  .dow span:nth-child(6),.dow span:nth-child(7){color:var(--rose)}

  .grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;gap:4px;flex:1;min-height:0}
  .cell{
    border:1px solid transparent;
    display:grid;place-items:center;
    font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--cream-dim);
    font-feature-settings:"tnum" 1;
    background:rgba(237,221,214,.02);
    transition:.18s;
  }
  .cell.dim{color:var(--muted);opacity:.32;background:transparent}
  .cell.weekend:not(.today){color:var(--rose)}
  .cell.today{
    background:var(--volt);color:var(--ink);font-weight:500;
    box-shadow:3px 3px 0 var(--rose), 0 0 30px rgba(212,255,0,.35);
    transform:translate(-1px,-1px);
    border-color:var(--volt);
    position:relative;
  }
  .cell.today:after{
    content:"";position:absolute;top:3px;right:3px;width:4px;height:4px;background:var(--ink);
  }

  .foot{display:flex;justify-content:space-between;align-items:center;font-size:9px;color:var(--muted);padding-top:6px}

  /* compact / responsive */
  @media (max-width: 600px){
    .card{grid-template-columns:1fr;max-height:none}
    .left{border-right:none;border-bottom:1px solid var(--hair)}
    .big{font-size:84px}
  }
</style>
</head>
<body>

<div class="card">
  <!-- LEFT -->
  <div class="left">
    <div class="head">
      <div class="month"><span id="m-name">April</span> <b id="m-year">'26</b></div>
      <div class="year mono" id="m-week">W17</div>
    </div>

    <div>
      <div class="big" id="t-day">24</div>
      <div class="day" id="t-dow">Friday</div>
      <div class="iso mono" id="t-iso">2026 · 04 · 24</div>
    </div>

    <div class="clock">
      <span><span class="pulse"></span><b id="t-clock">00:00</b></span>
      <span id="t-tz">local</span>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="nav">
      <span class="label mono" id="nav-label">April · 2026</span>
      <span class="week mono" id="nav-doy">Day 114 / 365</span>
    </div>
    <div class="dow mono">
      <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
    </div>
    <div class="grid" id="grid"></div>
    <div class="foot">
      <span class="mono"><span class="pulse"></span>LIVE · LOCAL TIME</span>
      <span class="mono" id="foot-left">— days remaining</span>
    </div>
  </div>
</div>

<script>
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOWS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const pad = n => String(n).padStart(2,'0');

  function isoWeek(d){
    const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    const dn = t.getUTCDay() || 7;
    t.setUTCDate(t.getUTCDate() + 4 - dn);
    const ys = new Date(Date.UTC(t.getUTCFullYear(),0,1));
    return Math.ceil((((t - ys)/86400000) + 1)/7);
  }
  function dayOfYear(d){
    const s = new Date(d.getFullYear(),0,0);
    return Math.floor((d - s)/86400000);
  }

  function render(){
    const now = new Date();
    const y = now.getFullYear(), m = now.getMonth(), day = now.getDate();

    document.getElementById('m-name').textContent = MONTHS[m];
    document.getElementById('m-year').textContent = "'" + String(y).slice(-2);
    document.getElementById('m-week').textContent = 'W' + pad(isoWeek(now));

    document.getElementById('t-day').textContent = pad(day);
    document.getElementById('t-dow').textContent = DOWS[now.getDay()];
    document.getElementById('t-iso').textContent = `${y} · ${pad(m+1)} · ${pad(day)}`;

    const tz = (Intl.DateTimeFormat().resolvedOptions().timeZone || 'local');
    document.getElementById('t-tz').textContent = tz.split('/').pop().replace(/_/g,' ');

    document.getElementById('nav-label').textContent = `${MONTHS[m]} · ${y}`;

    const isLeap = (y%4===0 && y%100!==0) || y%400===0;
    const total = isLeap?366:365;
    const doy = dayOfYear(now);
    document.getElementById('nav-doy').textContent = `Day ${doy} / ${total}`;
    document.getElementById('foot-left').textContent = `${total - doy} days remaining in ${y}`;

    // Mon-first month grid
    const first = new Date(y, m, 1);
    const lead = (first.getDay() + 6) % 7;
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const prevDays = new Date(y, m, 0).getDate();

    const cells = [];
    for(let i=lead;i>0;i--) cells.push({n: prevDays - i + 1, dim:true, weekend:false, today:false});
    for(let d=1;d<=daysInMonth;d++){
      const dt = new Date(y,m,d);
      const dow = dt.getDay();
      cells.push({n:d, dim:false, weekend:(dow===0||dow===6), today: d===day});
    }
    let trail = 1;
    while(cells.length < 42){ cells.push({n:trail++, dim:true, weekend:false, today:false}); }

    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    cells.forEach(c=>{
      const el = document.createElement('div');
      el.className = 'cell' + (c.dim?' dim':'') + (c.weekend?' weekend':'') + (c.today?' today':'');
      el.textContent = pad(c.n);
      grid.appendChild(el);
    });
  }

  function tick(){
    const now = new Date();
    document.getElementById('t-clock').textContent = pad(now.getHours()) + ':' + pad(now.getMinutes());
  }

  render(); tick();
  setInterval(tick, 30 * 1000);
  setInterval(()=>{
    const n = new Date();
    if(n.getHours()===0 && n.getMinutes() < 2) render();
  }, 60 * 1000);
</script>

</body>
</html>
